name: Build MochiUI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Generate theme files
      run: python scripts/gen_theme.py
      
    - name: Configure CMake
      # Using NMake Makefiles as requested
      run: cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release
      
    - name: Build MochiKit
      run: cmake --build build --target MochiKit --config Release
      
    - name: Build MochiExample
      run: cmake --build build --target MochiExample --config Release
      
    - name: Upload MochiKit library
      uses: actions/upload-artifact@v4
      with:
        name: MochiKit-lib
        path: |
          build/MochiKit.lib
          include/**/*.h
          include/**/*.hpp
        retention-days: 30
        
    - name: Upload MochiExample executable
      uses: actions/upload-artifact@v4
      with:
        name: MochiExample-exe
        path: build/MochiExample.exe
        retention-days: 30
        
    - name: Upload build logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: build/**/*.log
        retention-days: 7