container:
  type: div
  props:
    style:
      width: "100%"
      height: "100%"
      display: "flex"
      flexDirection: "column"
      backgroundColor: "#0b0f14"
      color: "#ffffff"
      fontFamily: "Inter, sans-serif"
  children:
    # ── NAVBAR ───────────────────────────────────────────────────────────────
    - type: div
      props:
        style:
          height: "64px"
          display: "flex"
          alignItems: "center"
          justifyContent: "space-between"
          padding: "0 16px"
          backgroundColor: "#0b0f14"
      children:
        # Left: app badge + name/version
        - type: div
          props:
            style:
              display: "flex"
              alignItems: "center"
              gap: "12px"
          children:
            - type: div
              props:
                style:
                  width: "28px"
                  height: "28px"
                  backgroundColor: "#4ade80"
                  color: "#000000"
                  display: "flex"
                  alignItems: "center"
                  justifyContent: "center"
                  fontSize: "12px"
                  fontWeight: "bold"
                  borderRadius: "4px"
                text: "OS"
            - type: div
              props:
                style:
                  display: "flex"
                  alignItems: "center"
                  gap: "8px"
                  fontSize: "14px"
              children:
                - type: span
                  props:
                    style: { fontWeight: "500" }
                    text: "OpenSampler"
                - type: span
                  props:
                    style: { color: "#9ca3af" }
                    text: "/ 1.0"

        # Center: menu
        - type: div
          props:
            style:
              display: "flex"
              alignItems: "center"
              gap: "24px"
              fontSize: "12px"
              letterSpacing: "0.025em"
          children:
            - type: span
              props:
                style:
                  color: "#ffffff"
                  borderBottom: "1px solid #4ade80"
                  paddingBottom: "4px"
                  cursor: "pointer"
                text: "PERFORM"
            - type: span
              props:
                style:
                  color: "#9ca3af"
                  cursor: "pointer"
                text: "MAPPING"
            - type: span
              props:
                style:
                  color: "#9ca3af"
                  cursor: "pointer"
                text: "SAMPLE"
            - type: span
              props:
                style:
                  color: "#9ca3af"
                  cursor: "pointer"
                text: "BROWSE"

        # Right: status + settings
        - type: div
          props:
            style:
              display: "flex"
              alignItems: "center"
              gap: "16px"
              fontSize: "12px"
          children:
            - type: div
              props:
                style:
                  padding: "4px 12px"
                  backgroundColor: "#11161d"
                  border: "1px solid #1f2a36"
                  borderRadius: "4px"
                  display: "flex"
                  alignItems: "center"
                  gap: "8px"
              children:
                - type: span
                  props: { text: "HOLLOW BELLS / vox-machine" }
            - type: span
              props:
                style: { color: "#9ca3af" }
                text: "CPU 4.2%"
            - type: span
              props:
                style: { color: "#9ca3af" }
                text: "VOICES 12/64"
            - type: div
              props:
                style:
                  width: "28px"
                  height: "28px"
                  display: "flex"
                  alignItems: "center"
                  justifyContent: "center"
                  backgroundColor: "#11161d"
                  border: "1px solid #1f2a36"
                  borderRadius: "4px"
                  cursor: "pointer"
                text: "⚙"

    # ── BODY ────────────────────────────────────────────────────────────────
    - type: div
      props:
        style:
          width: "100%"
          height: "100%"
          display: "flex"
          flexDirection: "column"
          padding: "16px"
          gap: "8px"
      children:
        - type: span
          props:
            style:
              color: "#9ca3af"
              fontSize: "13px"
            text: "This screen is defined in `ui/container.yml`."