name: Build SphereUI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── Source ───────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      # ── Toolchain ─────────────────────────────────────────────────────────────
      - name: Setup MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JS modules (workspace)
        working-directory: modules
        run: bun install

      # ── Skia prebuilt cache ───────────────────────────────────────────────────
      # Cache the downloaded+extracted Skia binaries so we don't re-download
      # on every run. Cache key is tied to CMakeLists.txt (URL lives there).
      - name: Cache Skia prebuilt
        id: cache-skia
        uses: actions/cache@v4
        with:
          path: external/prebuilt/skia
          key: skia-${{ hashFiles('CMakeLists.txt') }}

      # ── V8 prebuilt cache ────────────────────────────────────────────────────
      # Same pattern as Skia: CMake downloads/extracts on cache miss only.
      - name: Cache V8 prebuilt
        id: cache-v8
        uses: actions/cache@v4
        with:
          path: external/prebuilt/v8
          key: v8-${{ hashFiles('CMakeLists.txt') }}

      # ── CMake configure ───────────────────────────────────────────────────────
      # Prebuilt downloads (Skia/V8 if cache miss) happen via CMake file(DOWNLOAD …).
      - name: Configure CMake
        run: >
          cmake -B build -G "Ninja"
          -DCMAKE_BUILD_TYPE=Release

      # ── Build: libraries ───────────────────────────────────────────────────────
      - name: Build SphereKit.Foundation
        run: cmake --build build --target SphereKit_Foundation --config Release -j

      - name: Build SphereKit.GraphicInterface
        run: cmake --build build --target SphereKit_GraphicInterface --config Release -j

      - name: Build SphereKit.GraphicComponent
        run: cmake --build build --target SphereKit_GraphicComponent --config Release -j

      - name: Build SphereKit.DirectAudioEngine
        run: cmake --build build --target SphereKit_DirectAudioEngine --config Release -j

      - name: Build SphereKit.JavaScriptEngine
        run: cmake --build build --target SphereKit_JavaScriptEngine --config Release -j

      # ── Build: JS wrapper libraries ────────────────────────────────────────────
      - name: Build @spherekit/react (npm package + types)
        working-directory: modules/reactui
        run: bun run build

      - name: Build @spherekit/vue (npm package + types)
        working-directory: modules/vueui
        run: bun run build

      - name: Bundle @spherekit/react (C++ embed)
        working-directory: modules/reactui
        run: bun run bundle

      - name: Bundle @spherekit/vue (C++ embed)
        working-directory: modules/vueui
        run: bun run bundle

      - name: Build Sphere.React
        run: cmake --build build --target Sphere_React --config Release -j

      - name: Build SphereKit.Vue
        run: cmake --build build --target Sphere_Vue --config Release -j

      # ── Build: JS frontends ────────────────────────────────────────────────────
      - name: Bundle ReactUI demo
        working-directory: modules/reactui
        run: bun run bundle:demo

      - name: Bundle VueUI demo
        working-directory: modules/vueui
        run: bun run bundle:demo

      # ── Build: examples ─────────────────────────────────────────────────────────
      - name: Build SphereExample
        run: cmake --build build --target SphereExample --config Release -j

      - name: Build ActivityMonitor
        run: cmake --build build --target ActivityMonitor --config Release -j

      - name: Build MixerConsole
        run: cmake --build build --target MixerConsole --config Release -j

      - name: Build BorderlessPlayer
        run: cmake --build build --target BorderlessPlayer --config Release -j

      - name: Build ReactUIDemo
        run: cmake --build build --target ReactUIDemo --config Release -j

      - name: Build VueUIDemo
        run: cmake --build build --target VueUIDemo --config Release -j

      # ── Artifacts: SDK (libs + public headers) ───────────────────────────────────
      - name: Upload SphereKit SDK
        uses: actions/upload-artifact@v4
        with:
          name: SphereKit-SDK
          path: |
            build/SphereKit.Foundation.dll
            build/SphereKit.Foundation.lib
            build/SphereKit.GraphicInterface.dll
            build/SphereKit.GraphicInterface.lib
            build/SphereKit.GraphicComponent.dll
            build/SphereKit.GraphicComponent.lib
            build/SphereKit.DirectAudioEngine.dll
            build/SphereKit.DirectAudioEngine.lib
            build/SphereKit.JavaScriptEngine.dll
            build/SphereKit.JavaScriptEngine.lib
            build/Sphere.React.dll
            build/Sphere.React.lib
            build/SphereKit.Vue.dll
            build/SphereKit.Vue.lib
            include/SPHXApplication.hpp
            include/SPHXColor.hpp
            include/SPHXDirectAudioEngine.hpp
            include/SPHXFoundation.hpp
            include/SPHXGraphicComponents.hpp
            include/SPHXGraphicInterface.hpp
            include/SPHXIWidget.hpp
            include/SPHXImage.hpp
            include/SPHXPainter.hpp
            include/SPHXSvg.hpp
            include/SPHXJavaScriptEngine.hpp
            include/SphereReact.hpp
            include/SphereVUE.hpp
            include/audio/Streaming.hpp
            include/core/**
            include/gui/**
            include/platform/**
            include/utils/**
            framework/MikoUI/include/MikoUI.hpp
          retention-days: 30

      # ── Artifacts: examples ───────────────────────────────────────────────────
      - name: Upload examples
        uses: actions/upload-artifact@v4
        with:
          name: SphereKit-Examples
          path: |
            build/SphereExample.exe
            build/ActivityMonitor.exe
            build/MixerConsole.exe
            build/BorderlessPlayer.exe
            build/ReactUIDemo.exe
            build/VueUIDemo.exe
          retention-days: 30

      # ── Artifacts: failure logs ───────────────────────────────────────────────
      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build/**/*.log
            build/CMakeFiles/CMakeError.log
            build/CMakeFiles/CMakeOutput.log
          retention-days: 7
