name: Build AureliaUI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── Source ───────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      # ── Toolchain ─────────────────────────────────────────────────────────────
      - name: Setup MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Skia prebuilt cache ───────────────────────────────────────────────────
      # Cache the downloaded+extracted Skia binaries so we don't re-download
      # on every run. Cache key is tied to CMakeLists.txt (URL lives there).
      - name: Cache Skia prebuilt
        id: cache-skia
        uses: actions/cache@v4
        with:
          path: external/prebuilt/skia
          key: skia-${{ hashFiles('CMakeLists.txt') }}

      # ── V8 prebuilt cache ────────────────────────────────────────────────────
      # Same pattern as Skia: CMake downloads/extracts on cache miss only.
      - name: Cache V8 prebuilt
        id: cache-v8
        uses: actions/cache@v4
        with:
          path: external/prebuilt/v8
          key: v8-${{ hashFiles('CMakeLists.txt') }}

      # ── Code generation ───────────────────────────────────────────────────────
      - name: Generate theme header
        run: python scripts/gen_theme.py

      # ── CMake configure ───────────────────────────────────────────────────────
      # Prebuilt downloads (Skia/V8 if cache miss) happen via CMake file(DOWNLOAD …).
      - name: Configure CMake
        run: >
          cmake -B build -G "Ninja"
          -DCMAKE_BUILD_TYPE=Release

      # ── Build: libraries ───────────────────────────────────────────────────────
      - name: Build AureliaKit.Foundation
        run: cmake --build build --target AureliaKit_Foundation --config Release -j

      - name: Build AureliaKit.GraphicInterface
        run: cmake --build build --target AureliaKit_GraphicInterface --config Release -j

      - name: Build AureliaKit.GraphicComponent
        run: cmake --build build --target AureliaKit_GraphicComponent --config Release -j

      - name: Build AureliaKit.DirectAudioEngine
        run: cmake --build build --target AureliaKit_DirectAudioEngine --config Release -j

      - name: Build AureliaKit.JavaScriptEngine
        run: cmake --build build --target AureliaKit_JavaScriptEngine --config Release -j

      - name: Build Aurelia.React
        run: cmake --build build --target Aurelia_React --config Release -j

      - name: Build AureliaKit.DSL
        run: cmake --build build --target AureliaKit_DSL --config Release -j

      # ── Build: examples ─────────────────────────────────────────────────────────
      - name: Build AureliaExample
        run: cmake --build build --target AureliaExample --config Release -j

      - name: Build ActivityMonitor
        run: cmake --build build --target ActivityMonitor --config Release -j

      - name: Build MixerConsole
        run: cmake --build build --target MixerConsole --config Release -j

      - name: Build BorderlessPlayer
        run: cmake --build build --target BorderlessPlayer --config Release -j

      - name: Build DSLDemo
        run: cmake --build build --target DSLDemo --config Release -j

      # ── Artifacts: SDK (libs + public headers) ───────────────────────────────────
      - name: Upload AureliaKit SDK
        uses: actions/upload-artifact@v4
        with:
          name: AureliaKit-SDK
          path: |
            build/AureliaKit.Foundation.dll
            build/AureliaKit.Foundation.lib
            build/AureliaKit.GraphicInterface.dll
            build/AureliaKit.GraphicInterface.lib
            build/AureliaKit.GraphicComponent.dll
            build/AureliaKit.GraphicComponent.lib
            build/AureliaKit.DirectAudioEngine.dll
            build/AureliaKit.DirectAudioEngine.lib
            build/AureliaKit.JavaScriptEngine.dll
            build/AureliaKit.JavaScriptEngine.lib
            build/Aurelia.React.dll
            build/Aurelia.React.lib
            build/AureliaKit.DSL.dll
            build/AureliaKit.DSL.lib
            include/AUKApplication.hpp
            include/AUKColor.hpp
            include/AUKDirectAudioEngine.hpp
            include/AUKFoundation.hpp
            include/AUKGraphicComponents.hpp
            include/AUKGraphicInterface.hpp
            include/AUKIWidget.hpp
            include/AUKImage.hpp
            include/AUKPainter.hpp
            include/AUKSvg.hpp
            include/AUKJavaScriptEngine.hpp
            include/AUKDSL.hpp
            include/AureliaReact.hpp
            include/audio/Streaming.hpp
            include/core/**
            include/dsl/**
            include/gui/**
            include/platform/**
            include/utils/**
            framework/MikoUI/include/MikoUI.hpp
          retention-days: 30

      # ── Artifacts: examples ───────────────────────────────────────────────────
      - name: Upload examples
        uses: actions/upload-artifact@v4
        with:
          name: AureliaKit-Examples
          path: |
            build/AureliaExample.exe
            build/ActivityMonitor.exe
            build/MixerConsole.exe
            build/BorderlessPlayer.exe
            build/DSLDemo.exe
          retention-days: 30

      # ── Artifacts: failure logs ───────────────────────────────────────────────
      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            build/**/*.log
            build/CMakeFiles/CMakeError.log
            build/CMakeFiles/CMakeOutput.log
          retention-days: 7
