name: Build AureliaUI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate theme files
        run: python scripts/gen_theme.py

      - name: Configure CMake
        run: cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release

      - name: Build AureliaKit libraries
        run: |
          cmake --build build --target AureliaKit_Foundation --config Release
          cmake --build build --target AureliaKit_GraphicInterface --config Release
          cmake --build build --target AureliaKit_GraphicComponent --config Release
          cmake --build build --target AureliaKit_DirectAudioEngine --config Release

      - name: Build AureliaExample
        run: cmake --build build --target AureliaExample --config Release

      - name: Upload AureliaKit libraries
        uses: actions/upload-artifact@v4
        with:
          name: AureliaKit-lib
          path: |
            build/AureliaKit.Foundation.dll
            build/AureliaKit.Foundation.lib
            build/AureliaKit.GraphicInterface.dll
            build/AureliaKit.GraphicInterface.lib
            build/AureliaKit.GraphicComponent.dll
            build/AureliaKit.GraphicComponent.lib
            build/AureliaKit.DirectAudioEngine.dll
            build/AureliaKit.DirectAudioEngine.lib
            include/**/*.hpp
          retention-days: 30

      - name: Upload AureliaExample executable
        uses: actions/upload-artifact@v4
        with:
          name: AureliaExample-exe
          path: build/AureliaExample.exe
          retention-days: 30

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build/**/*.log
          retention-days: 7
