name: Build MochiUI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Setup MSVC Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Generate theme files
      run: python scripts/gen_theme.py

    - name: Configure CMake
      run: cmake -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release

    - name: Build MochiKit libraries
      run: |
        cmake --build build --target MochiKit_Foundation --config Release
        cmake --build build --target MochiKit_GraphicInterface --config Release
        cmake --build build --target MochiKit_GraphicComponent --config Release
        cmake --build build --target MochiKit_DirectAudioEngine --config Release

    - name: Build MochiExample
      run: cmake --build build --target MochiExample --config Release

    - name: Upload MochiKit libraries
      uses: actions/upload-artifact@v4
      with:
        name: MochiKit-lib
        path: |
          build/MochiKit.Foundation.dll
          build/MochiKit.Foundation.lib
          build/MochiKit.GraphicInterface.dll
          build/MochiKit.GraphicInterface.lib
          build/MochiKit.GraphicComponent.dll
          build/MochiKit.GraphicComponent.lib
          build/MochiKit.DirectAudioEngine.dll
          build/MochiKit.DirectAudioEngine.lib
          include/**/*.hpp
        retention-days: 30

    - name: Upload MochiExample executable
      uses: actions/upload-artifact@v4
      with:
        name: MochiExample-exe
        path: build/MochiExample.exe
        retention-days: 30

    - name: Upload build logs
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: build/**/*.log
        retention-days: 7
